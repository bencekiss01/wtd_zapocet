<!DOCTYPE html>
<html lang="sk">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Webová Stránka</h1>
    <nav>
      <a href="index.html">Domov</a>
      <a href="about.html">O Nás</a>
      <a href="gallery.html">Galéria</a>
      <a href="form.html">Formulár</a>
      <a href="data.html">Dáta</a>
      <a href="contact.html">Kontakt</a>
    </nav>
  </header>

  <main>
    <h2>Formulár</h2>

    <form id="registration-form" novalidate>
      <div>
        <label for="name">Name:</label><br>
        <input type="text" id="name" required>
        <span class="error-message" id="error-name"></span>
      </div>
      
      <div>
        <label for="email">Email:</label><br>
        <input type="email" id="email" required>
        <span class="error-message" id="error-email"></span>
      </div>
      
      <div>
        <label for="age">Age:</label><br>
        <input type="number" id="age" min="0" max="120" required>
        <span class="error-message" id="error-age"></span>
      </div>

      <div>
        <p>Gender:</p> 
        <label><input type="radio" name="gender" value="male" required>Male</label>
        <label><input type="radio" name="gender" value="female" required>Female</label>
         <span class="error-message" id="error-gender"></span>
      </div>

      <div>
        <label for="message">Message:</label> <br>
        <textarea id="message" rows="4" required></textarea>
        <span class="error-message" id="error-message"></span>
      </div>

      <div>
        <label>
          <input type="checkbox" id="terms" name="terms" required>
          I agree with the terms.
        </label>
        <span class="error-message" id="error-terms"></span>
      </div>
      
      <button type="submit">Submit</button>
    </form>

    <p id="result"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
